spring:
  application:
    name: crypto-trading
  datasource:
    url: jdbc:h2:mem:cryptodb
    driver-class-name: org.h2.Driver
    username: phat
    password: phat
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
